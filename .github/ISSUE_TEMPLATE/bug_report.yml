name: Bug report
description: Something in Northstar UI is not behaving as documented.
labels: [bug, triage]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: input
    id: component
    attributes:
      label: Component
      placeholder: e.g. Dialog, Button, Tabs
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Ideally a minimal code snippet or a link to a reproduction.
      placeholder: |
        1. Render <Dialog open>
        2. Press Escape
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected vs actual behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: northstar-ui version
      placeholder: 0.1.0
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: React version, browser, OS, assistive tech if relevant.
