name: Feature request
description: Propose a new component, prop, or behavior.
labels: [enhancement, triage]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to build that the current API makes hard?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed API
      description: Sketch the component or prop signature you have in mind.
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: accessibility
    attributes:
      label: Accessibility
      options:
        - label: I have considered keyboard and screen-reader behavior for this proposal.
